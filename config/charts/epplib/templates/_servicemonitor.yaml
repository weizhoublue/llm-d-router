{{- define "inference-extension.service-monitor" -}}
{{- $monitoringProviderName := include "llm-d-router.monitoring.provider.name" . | lower -}}
{{- if and .Values.inferenceExtension.monitoring.prometheus.enabled (eq $monitoringProviderName "prometheusoperator") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "llm-d-router.name" . }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-router.labels" . | nindent 4 }}
    {{- with .Values.inferenceExtension.monitoring.prometheus.extraLabels }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}
spec:
  endpoints:
  - interval: {{ .Values.inferenceExtension.monitoring.interval }}
    port: "http-metrics"
    path: "/metrics"
    {{- if .Values.inferenceExtension.monitoring.prometheus.auth.enabled }}
    authorization:
      credentials:
        key: token
        name: {{ .Values.inferenceExtension.monitoring.prometheus.auth.secretName }}
    {{- end }}
  jobLabel: {{ include "llm-d-router.name" . }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "llm-d-router.labels" . | nindent 6 }}
---
{{- end }}
{{- end }}
