name: Build and Push Container Images

on:
  workflow_call:
    inputs:
      epp-image-name:
        required: true
        type: string
      sidecar-image-name:
        required: true
        type: string
      tag:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      chart-suffix:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-epp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build and push EPP image
        uses: ./.github/actions/docker-build-and-push
        with:
          docker-file: Dockerfile.epp
          tag: ${{ inputs.tag }}
          image-name: ${{ inputs.epp-image-name }}
          registry: ghcr.io/llm-d
          github-token: ${{ github.token }}
          prerelease: ${{ inputs.prerelease }}
          commit-sha: ${{ github.sha }}

      - name: Run Trivy scan on EPP image
        uses: ./.github/actions/trivy-scan
        with:
          image: ghcr.io/llm-d/${{ inputs.epp-image-name }}:${{ inputs.tag }}

  build-sidecar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build and push sidecar image
        uses: ./.github/actions/docker-build-and-push
        with:
          docker-file: Dockerfile.sidecar
          tag: ${{ inputs.tag }}
          image-name: ${{ inputs.sidecar-image-name }}
          registry: ghcr.io/llm-d
          github-token: ${{ github.token }}
          prerelease: ${{ inputs.prerelease }}
          commit-sha: ${{ github.sha }}

      - name: Run Trivy scan on sidecar image
        uses: ./.github/actions/trivy-scan
        with:
          image: ghcr.io/llm-d/${{ inputs.sidecar-image-name }}:${{ inputs.tag }}

  push-helm-charts:
    needs: [build-epp, build-sidecar]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Standalone Chart
        uses: ./.github/actions/helm-build-and-push
        with:
          chart_name: llm-d-router-standalone
          extra_tag: ${{ inputs.tag }}
          chart_suffix: ${{ inputs.chart-suffix }}
          epp_image_repository: ${{ inputs.epp-image-name }}

      - name: Build and Push Gateway Chart
        uses: ./.github/actions/helm-build-and-push
        with:
          chart_name: llm-d-router-gateway
          extra_tag: ${{ inputs.tag }}
          chart_suffix: ${{ inputs.chart-suffix }}
          epp_image_repository: ${{ inputs.epp-image-name }}


