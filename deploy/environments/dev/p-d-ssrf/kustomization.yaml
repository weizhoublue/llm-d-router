# ------------------------------------------------------------------------------
# P/D (Prefill/Decode) with SSRF Protection
#
# Deploys the full dev stack with separate prefill and decode deployments,
# with SSRF protection enabled on the sidecar.
#
# To enable SSRF, set SIDECAR_EXTRA_ARGS before building:
#   kustomize build --load-restrictor=none . | \
#     sed 's|${SIDECAR_EXTRA_ARGS}|--enable-ssrf-protection=true --inference-pool=MODEL_NAME-inference-pool|g'
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../p-d/
- ../../../components/vllm-decode/rbac-ssrf.yaml

patches:
- path: ../p-d/patch-decode.yaml

components:
- ../../../components/overlays/simulator/
