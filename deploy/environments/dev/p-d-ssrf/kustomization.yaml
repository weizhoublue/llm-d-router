# ------------------------------------------------------------------------------
# P/D (Prefill/Decode) with SSRF Protection
#
# Deploys the full dev stack with separate prefill and decode deployments,
# with SSRF protection enabled on the sidecar.
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../p-d/
- ../../../components/vllm-decode/rbac-ssrf.yaml

patches:
- path: ../p-d/patch-decode.yaml
- path: ../p-d/patch-ssrf.yaml

components:
- ../../../components/overlays/simulator/
