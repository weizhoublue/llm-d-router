apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
spec:
  template:
    spec:
      initContainers:
      - name: routing-sidecar
        args:
        - "--port=8000"
        - "--vllm-port=8200"
        - "--kv-connector=${CONNECTOR_TYPE}"
        - "--mooncake-bootstrap-port=8000"
        - "--secure-proxy=false"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--enable-ssrf-protection=true"
        - "--inference-pool=${POOL_NAME}"
